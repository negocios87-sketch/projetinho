<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planejamento de Viagem ✈️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,'Segoe UI',sans-serif;background:#f5f5f0;color:#2a2a2a;min-height:100vh}
#login{min-height:100vh;display:flex;align-items:center;justify-content:center}
.lbox{background:#fff;border:1px solid #e8e8e3;border-radius:16px;padding:38px 34px;width:310px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.07)}
.lbox .ico{font-size:36px;margin-bottom:10px}
.lbox h2{font-size:17px;font-weight:600;margin-bottom:6px}
.lbox p{font-size:12px;color:#999;margin-bottom:22px}
input,textarea{width:100%;border:1px solid #e0e0d8;border-radius:8px;padding:10px 13px;font-size:14px;font-family:inherit;outline:none;color:#1a1a1a;background:#fafaf8;transition:border-color .15s;box-sizing:border-box}
input:focus,textarea:focus{border-color:#999;background:#fff}
textarea{min-height:72px;resize:vertical}
.btn{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-dark{background:#1a1a1a;color:#fff}
.btn-ghost{background:#fff;color:#555;border:1px solid #e0e0d8}
.btn-ghost:hover{background:#f5f5f0}
.btn-red{background:#e05555;color:#fff}
.btn-full{width:100%;padding:11px}
#app{display:none}
header{background:#fff;border-bottom:1px solid #e8e8e3;padding:14px 28px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:17px;font-weight:600}
.sync{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:500}
.s-ok{background:#e8f5e9;color:#2e7d32}
.s-ing{background:#fff8e1;color:#f57f17}
.s-err{background:#fff0f0;color:#e05555}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e8e3;overflow-x:auto;padding-left:12px}
.tab{padding:13px 18px;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;color:#888;user-select:none;transition:color .15s}
.tab:hover{color:#444}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}
.tab-dm{color:#e0555566}
.tab-dm:hover{color:#e05555}
.tab-dm.active{color:#e05555;border-bottom-color:#e05555}
.content{padding:24px 28px;max-width:1000px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:12px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.5px}
.pb-wrap{background:#eee;border-radius:999px;height:4px;overflow:hidden;margin-bottom:5px}
.pb{height:100%;background:#1a1a1a;border-radius:999px;transition:width .3s}
.pb-lbl{font-size:11px;color:#bbb;margin-bottom:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:13px}
.empty-state{text-align:center;padding:52px 20px;color:#ccc;font-size:14px}
.card{background:#fff;border:1px solid #e8e8e3;border-radius:12px;padding:16px;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 14px rgba(0,0,0,.07)}
.card.done{background:#fafaf8;border-color:#e0e0d8;opacity:.72}
.card.done .c-title{text-decoration:line-through;color:#bbb}
.card.dm{border-left:3px solid #e05555}
.c-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px}
.c-title{font-size:14px;font-weight:600;color:#1a1a1a;flex:1;line-height:1.4}
.c-ans{font-size:13px;color:#555;font-style:italic;margin-bottom:13px;min-height:16px}
.c-ans.empty{color:#ccc}
.c-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.bsm{padding:5px 11px;border:1px solid #e8e8e3;background:#fff;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;color:#555;transition:background .12s}
.bsm:hover{background:#f0f0ec}
.bsm.dark{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.bsm.dark:hover{background:#333}
.badge{font-size:11px;background:#e8f5e9;color:#2e7d32;padding:3px 9px;border-radius:20px;font-weight:500}
.menu-wrap{position:relative}
.menu-btn{background:none;border:none;cursor:pointer;padding:2px 6px;color:#ccc;font-size:16px;border-radius:4px}
.menu-btn:hover{color:#888;background:#f0f0ec}
.ctx{position:absolute;right:0;top:100%;background:#fff;border:1px solid #e0e0d8;border-radius:9px;box-shadow:0 4px 18px rgba(0,0,0,.1);z-index:99;padding:4px;min-width:125px;display:none}
.ctx.open{display:block}
.ci{padding:7px 13px;font-size:13px;cursor:pointer;border-radius:6px;color:#333}
.ci:hover{background:#f5f5f0}
.ci.danger{color:#e05555}
.ci.danger:hover{background:#fff0f0}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.22);z-index:1000;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:15px;padding:26px;width:390px;max-width:93vw;box-shadow:0 10px 48px rgba(0,0,0,.14)}
.modal h2{font-size:15px;font-weight:600;margin-bottom:18px}
.lbl{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:5px;margin-top:14px}
.lbl:first-of-type{margin-top:0}
.m-row{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:10px;font-size:13px;z-index:9999;display:none;white-space:nowrap}
</style>
</head>
<body>

<div id="login">
  <div class="lbox">
    <div class="ico">✈️</div>
    <h2>Planejamento de Viagem</h2>
    <p>Digite a senha pra entrar</p>
    <input type="password" id="pwd" placeholder="••••••••" style="text-align:center;letter-spacing:3px;margin-bottom:12px" onkeydown="if(event.key==='Enter')tryLogin()">
    <button class="btn btn-dark btn-full" onclick="tryLogin()">Entrar</button>
    <p id="lerr" style="font-size:12px;color:#e05555;margin-top:10px;display:none">Senha errada, meu chapa. 🙃</p>
  </div>
</div>

<div id="app">
  <header>
    <h1>✈️ Planejamento de Viagem</h1>
    <span class="sync s-ok" id="sync">● Sincronizado</span>
  </header>
  <div class="tabs">
    <div class="tab active" data-tab="viagem">🗺️ Viagem</div>
    <div class="tab" data-tab="financeiro">💰 Financeiro</div>
    <div class="tab" data-tab="estadia">🏨 Estadia</div>
    <div class="tab tab-dm" data-tab="deu-merda">🔥 Deu Merda</div>
  </div>
  <div class="content">
    <div class="sec-hdr">
      <span class="sec-title" id="sec-lbl"></span>
      <button class="btn" id="add-btn" onclick="openModal()">+ Novo card</button>
    </div>
    <div id="pb-area">
      <div class="pb-wrap"><div class="pb" id="pb" style="width:0%"></div></div>
      <div class="pb-lbl" id="pb-lbl"></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty-state" id="empty" style="display:none"></div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="m-title">Novo card</h2>
    <label class="lbl">O que precisa resolver?</label>
    <input id="m-q" placeholder="Ex: Decidir país, Passagem aérea..." onkeydown="if(event.key==='Enter')document.getElementById('m-a').focus()">
    <label class="lbl">Resposta / decisão <span style="font-weight:400;text-transform:none">(opcional)</span></label>
    <textarea id="m-a" placeholder="Ex: Itália. Voo pela TAP, saída 15/01..."></textarea>
    <div class="m-row">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-dark" id="m-save" onclick="saveCard()">Criar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LABELS = { viagem:'🗺️ Viagem', financeiro:'💰 Financeiro', estadia:'🏨 Estadia', 'deu-merda':'🔥 Deu Merda' };
const POLL = 6000;

let pwd = '';
let state = { viagem:[], financeiro:[], estadia:[], 'deu-merda':[] };
let curTab = 'viagem';
let editId = null, modalTab = null;
let saving = false;

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }

function tryLogin(){
  pwd = document.getElementById('pwd').value;
  if(!pwd){ showToast('Coloca a senha aí!'); return; }
  setSyncBadge('ing','Verificando...');
  apiFetch('GET')
    .then(data => {
      state = data;
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderAll();
      setInterval(doPoll, POLL);
    })
    .catch(e => {
      setSyncBadge('ok','● Sincronizado');
      const err = document.getElementById('lerr');
      err.textContent = e.message.includes('401') ? 'Senha errada, meu chapa. 🙃' : 'Erro de conexão. Tenta de novo.';
      err.style.display = 'block';
      setTimeout(()=>err.style.display='none', 3000);
    });
}

async function apiFetch(method, body){
  const opts = { method, headers:{ 'Content-Type':'application/json', 'x-password': pwd } };
  if(body) opts.body = JSON.stringify(body);
  const res = await fetch('/api/state', opts);
  if(!res.ok){ const t = await res.text(); throw new Error(`${res.status}: ${t}`); }
  return res.json();
}

async function doPoll(){
  if(saving) return;
  try{ const data = await apiFetch('GET'); state = data; renderAll(); }catch{}
}

async function persist(){
  saving = true;
  setSyncBadge('ing','Salvando...');
  try{
    await apiFetch('POST', state);
    setSyncBadge('ok','● Sincronizado');
  }catch(e){
    setSyncBadge('err','● Erro ao salvar');
    showToast('Erro ao salvar: '+e.message);
  }finally{ saving = false; }
}

function setSyncBadge(type, label){
  const b = document.getElementById('sync');
  b.className = 'sync '+(type==='ok'?'s-ok':type==='ing'?'s-ing':'s-err');
  if(label) b.textContent = label;
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    curTab = t.dataset.tab;
    renderAll();
  });
});

function renderAll(){
  const isDM = curTab === 'deu-merda';
  const cards = state[curTab] || [];
  document.getElementById('sec-lbl').textContent = LABELS[curTab];
  const addBtn = document.getElementById('add-btn');
  addBtn.textContent = isDM ? '+ Registrar problema' : '+ Novo card';
  addBtn.className = 'btn '+(isDM?'btn-red':'btn-dark');
  document.getElementById('pb-area').style.display = isDM?'none':'block';
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if(!cards.length){
    grid.innerHTML='';
    empty.style.display='block';
    empty.textContent = isDM?'Nenhuma merda registrada. 🍀':'Nenhum card ainda. Cria o primeiro! 👆';
  } else {
    empty.style.display='none';
    grid.innerHTML = cards.map(c=>cardHTML(c,curTab)).join('');
  }
  if(!isDM){
    const total=cards.length, done=cards.filter(c=>c.done).length;
    const pct=total?Math.round((done/total)*100):0;
    document.getElementById('pb').style.width=pct+'%';
    document.getElementById('pb-lbl').textContent=total?`${done} de ${total} resolvidos (${pct}%)`:'';
  }
}

function cardHTML(c,sec){
  const isDM=sec==='deu-merda';
  const ans=c.answer?`<div class="c-ans">${esc(c.answer)}</div>`:`<div class="c-ans empty">Sem resposta ainda</div>`;
  const acts=c.done
    ?`<span class="badge">✓ Resolvido</span><button class="bsm" onclick="toggle('${sec}','${c.id}')">Reabrir</button>`
    :`<button class="bsm" onclick="openModal('${sec}','${c.id}')">Responder</button><button class="bsm dark" onclick="toggle('${sec}','${c.id}')">✓ Concluir</button>`;
  return `<div class="card${c.done?' done':''}${isDM?' dm':''}">
    <div class="c-top">
      <div class="c-title">${esc(c.title)}</div>
      <div class="menu-wrap">
        <button class="menu-btn" onclick="toggleCtx(event,'${c.id}')">⋯</button>
        <div class="ctx" id="ctx-${c.id}">
          <div class="ci" onclick="closeCtx();openModal('${sec}','${c.id}')">✏️ Editar</div>
          <div class="ci danger" onclick="closeCtx();delCard('${sec}','${c.id}')">🗑️ Excluir</div>
        </div>
      </div>
    </div>
    ${ans}
    <div class="c-actions">${acts}</div>
  </div>`;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function toggleCtx(e,id){
  e.stopPropagation();
  const ctx=document.getElementById('ctx-'+id);
  const was=ctx.classList.contains('open');
  closeCtx();
  if(!was) ctx.classList.add('open');
}
function closeCtx(){ document.querySelectorAll('.ctx.open').forEach(c=>c.classList.remove('open')); }
document.addEventListener('click', closeCtx);

function openModal(tabArg,id=null){
  modalTab=tabArg||curTab; editId=id;
  const isDM=modalTab==='deu-merda';
  document.getElementById('m-title').textContent=id?'Editar card':(isDM?'Registrar problema':'Novo card');
  document.getElementById('m-save').textContent=id?'Salvar':'Criar';
  if(id){ const c=(state[modalTab]||[]).find(x=>x.id===id); document.getElementById('m-q').value=c?.title||''; document.getElementById('m-a').value=c?.answer||''; }
  else { document.getElementById('m-q').value=''; document.getElementById('m-a').value=''; }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-q').focus(),80);
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); editId=null; }
document.getElementById('overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('overlay'))closeModal(); });

async function saveCard(){
  const title=document.getElementById('m-q').value.trim();
  if(!title){ document.getElementById('m-q').style.borderColor='#e05555'; return; }
  document.getElementById('m-q').style.borderColor='#e0e0d8';
  const answer=document.getElementById('m-a').value.trim();
  if(editId){ const c=(state[modalTab]||[]).find(x=>x.id===editId); if(c){c.title=title;c.answer=answer;} }
  else { if(!state[modalTab])state[modalTab]=[]; state[modalTab].push({id:uid(),title,answer,done:false,ts:Date.now()}); }
  closeModal(); renderAll(); await persist();
}

async function toggle(sec,id){
  const c=(state[sec]||[]).find(x=>x.id===id); if(c)c.done=!c.done;
  renderAll(); await persist();
}

async function delCard(sec,id){
  if(!confirm('Excluir esse card?')) return;
  state[sec]=(state[sec]||[]).filter(x=>x.id!==id);
  renderAll(); await persist();
}

function showToast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.style.display='block';
  setTimeout(()=>t.style.display='none',3500);
}
</script>
</body>
</html>
